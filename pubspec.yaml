name: gdrive_desktop
description: A Flutter desktop GUI for gdrive-cli — Git-like Google Drive sync.
version: 1.0.0+1
publish_to: none

environment:
  sdk: ">=3.3.0 <4.0.0"
  flutter: ">=3.19.0"

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.2
  shared_preferences: ^2.2.3
  path_provider: ^2.1.3
  file_picker: ^8.0.3
  url_launcher: ^6.3.2
  google_fonts: ^6.2.1
  intl: ^0.19.0
  http: ^1.6.0
  window_manager: ^0.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true